<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dein Custom Wordle</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121213; color: white; text-align: center; }
        #game { max-width: 600px; margin: 20px auto; }
        .row { display: flex; justify-content: center; margin-bottom: 5px; }
        .tile { width: 50px; height: 50px; border: 2px solid #3a3a3c; margin: 0 3px;
                display: flex; align-items: center; justify-content: center; 
                font-size: 24px; font-weight: bold; text-transform: uppercase; }
        .correct { background-color: #538d4e; border-color: #538d4e; }
        .present { background-color: #b59f3b; border-color: #b59f3b; }
        .absent { background-color: #3a3a3c; border-color: #3a3a3c; }
        input { font-size: 18px; padding: 10px; text-transform: uppercase; width: 200px; text-align: center; margin-bottom: 10px; }
        button { font-size: 18px; padding: 10px; cursor: pointer; background: #538d4e; color: white; border: none; font-weight: bold; border-radius: 5px; }
        button:hover { background: #43733f; }
        #shareBtn { display: none; margin: 20px auto; background: #007eed; }
        #shareBtn:hover { background: #0065be; }
    </style>
</head>
<body>

    <h1>Tägliches Wordle Challenge!</h1>
    <div id="game"></div>
    
    <div id="input-area">
        <input type="text" id="guessInput" placeholder="Dein Tipp">
        <br>
        <button onclick="makeGuess()">Tippen</button>
    </div>

    <h2 id="message"></h2>
    <button id="shareBtn" onclick="shareResult()">📊 Ergebnis teilen</button>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const encodedWord = urlParams.get('w');
        
        let targetWord = "APFEL"; 
        if (encodedWord) {
            try {
                targetWord = atob(encodedWord).toUpperCase();
            } catch(e) {
                console.error("Ungültiger Link");
            }
        }

        const WORD_LENGTH = targetWord.length;
        const MAX_GUESSES = 6;
        let guesses = [];
        let shareGrid = []; // Speichert die Emoji-Quadrate für das Teilen

        const inputField = document.getElementById('guessInput');
        inputField.maxLength = WORD_LENGTH;
        inputField.placeholder = `${WORD_LENGTH} Buchstaben`;

        const gameDiv = document.getElementById('game');
        for (let i = 0; i < MAX_GUESSES; i++) {
            let row = document.createElement('div');
            row.className = 'row';
            for (let j = 0; j < WORD_LENGTH; j++) {
                let tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `tile-${i}-${j}`;
                row.appendChild(tile);
            }
            gameDiv.appendChild(row);
        }

        function makeGuess() {
            const input = document.getElementById('guessInput');
            let guess = input.value.toUpperCase().trim();
            
            if (guess.length !== WORD_LENGTH) {
                alert(`Das Wort muss exakt ${WORD_LENGTH} Buchstaben haben!`);
                return;
            }

            let currentRow = guesses.length;
            if (currentRow >= MAX_GUESSES) return;

            guesses.push(guess);
            input.value = "";

            let rowEmojis = "";

            // Buchstaben prüfen und färben
            for (let i = 0; i < WORD_LENGTH; i++) {
                let tile = document.getElementById(`tile-${currentRow}-${i}`);
                tile.innerText = guess[i];

                if (guess[i] === targetWord[i]) {
                    tile.classList.add('correct');
                    rowEmojis += "🟩";
                } else if (targetWord.includes(guess[i])) {
                    tile.classList.add('present');
                    rowEmojis += "🟨";
                } else {
                    tile.classList.add('absent');
                    rowEmojis += "⬛";
                }
            }
            
            shareGrid.push(rowEmojis);

            // Gewinn / Verlust prüfen
            if (guess === targetWord) {
                document.getElementById('message').innerText = "🎉 Gewonnen!";
                endGame();
            } else if (guesses.length >= MAX_GUESSES) {
                document.getElementById('message').innerText = `😢 Verloren! Das Wort war: ${targetWord}`;
                endGame();
            }
        }

        function endGame() {
            document.getElementById('input-area').style.display = 'none';
            // Zeigt den Teilen-Button an, wenn das Spiel vorbei ist
            document.getElementById('shareBtn').style.display = 'block';
        }

        function shareResult() {
            // Text zusammenbauen
            const status = (guesses[guesses.length - 1] === targetWord) ? guesses.length : "X";
            let text = `🟩 **Custom Wordle Challenge**\nVersuch: ${status}/${MAX_GUESSES}\n\n`;
            text += shareGrid.join("\n");

            // In die Zwischenablage kopieren
            navigator.clipboard.writeText(text).then(() => {
                alert("Ergebnis in die Zwischenablage kopiert! Du kannst es jetzt bei Discord einfügen.");
            }).catch(err => {
                alert("Fehler beim Kopieren: ", err);
            });
        }
    </script>
</body>
</html>
