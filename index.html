<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dein Custom Wordle</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121213; color: white; text-align: center; margin: 0; padding: 20px; }
        #game { max-width: 600px; margin: 20px auto; }
        .row { display: flex; justify-content: center; margin-bottom: 5px; }
        .tile { width: 50px; height: 50px; border: 2px solid #3a3a3c; margin: 0 3px;
                display: flex; align-items: center; justify-content: center; 
                font-size: 24px; font-weight: bold; text-transform: uppercase; }
        
        /* Farben für Spielfeld und Tastatur */
        .correct { background-color: #538d4e !important; border-color: #538d4e !important; color: white; }
        .present { background-color: #b59f3b !important; border-color: #b59f3b !important; color: white; }
        .absent { background-color: #3a3a3c !important; border-color: #3a3a3c !important; color: white; }
        
        /* Virtuelle Tastatur */
        #keyboard { max-width: 500px; margin: 30px auto 20px auto; }
        .kb-row { display: flex; justify-content: center; margin-bottom: 8px; }
        .key { background-color: #818384; color: white; border: none; font-weight: bold;
               height: 58px; margin: 0 4px; border-radius: 4px; cursor: pointer;
               display: flex; align-items: center; justify-content: center; 
               flex: 1; font-size: 14px; text-transform: uppercase; user-select: none; }
        .key.wide { flex: 1.5; font-size: 12px; }
        
        /* Teilen Button */
        #shareBtn { display: none; margin: 20px auto; background: #007eed; color: white; font-size: 18px; 
                    padding: 12px 24px; border: none; font-weight: bold; border-radius: 5px; cursor: pointer; }
        #shareBtn:hover { background: #0065be; }
        #message { margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Tägliches Wordle Challenge!</h1>
    <div id="game"></div>
    
    <div id="keyboard">
        <div class="kb-row">
            <button class="key" onclick="pressKey('Q')">Q</button>
            <button class="key" onclick="pressKey('W')">W</button>
            <button class="key" onclick="pressKey('E')">E</button>
            <button class="key" onclick="pressKey('R')">R</button>
            <button class="key" onclick="pressKey('T')">T</button>
            <button class="key" onclick="pressKey('Z')">Z</button>
            <button class="key" onclick="pressKey('U')">U</button>
            <button class="key" onclick="pressKey('I')">I</button>
            <button class="key" onclick="pressKey('O')">O</button>
            <button class="key" onclick="pressKey('P')">P</button>
            <button class="key" onclick="pressKey('Ü')">Ü</button>
        </div>
        <div class="kb-row">
            <button class="key" onclick="pressKey('A')">A</button>
            <button class="key" onclick="pressKey('S')">S</button>
            <button class="key" onclick="pressKey('D')">D</button>
            <button class="key" onclick="pressKey('F')">F</button>
            <button class="key" onclick="pressKey('G')">G</button>
            <button class="key" onclick="pressKey('H')">H</button>
            <button class="key" onclick="pressKey('J')">J</button>
            <button class="key" onclick="pressKey('K')">K</button>
            <button class="key" onclick="pressKey('L')">L</button>
            <button class="key" onclick="pressKey('Ö')">Ö</button>
            <button class="key" onclick="pressKey('Ä')">Ä</button>
        </div>
        <div class="kb-row">
            <button class="key wide" onclick="pressKey('ENTER')">ENTER</button>
            <button class="key" onclick="pressKey('Y')">Y</button>
            <button class="key" onclick="pressKey('X')">X</button>
            <button class="key" onclick="pressKey('C')">C</button>
            <button class="key" onclick="pressKey('V')">V</button>
            <button class="key" onclick="pressKey('B')">B</button>
            <button class="key" onclick="pressKey('N')">N</button>
            <button class="key" onclick="pressKey('M')">M</button>
            <button class="key wide" onclick="pressKey('BACK')">⌫</button>
        </div>
    </div>

    <h2 id="message"></h2>
    <button id="shareBtn" onclick="shareResult()">📊 Ergebnis teilen</button>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const encodedWord = urlParams.get('w');
        
        let targetWord = "APFEL"; 
        if (encodedWord) {
            try {
                targetWord = atob(encodedWord).toUpperCase();
            } catch(e) {
                console.error("Ungültiger Link");
            }
        }

        const WORD_LENGTH = targetWord.length;
        const MAX_GUESSES = 6;
        
        let guesses = [];
        let currentGuess = "";
        let isGameOver = false;
        let shareGrid = [];

        // Spielfeld dynamisch aufbauen
        const gameDiv = document.getElementById('game');
        for (let i = 0; i < MAX_GUESSES; i++) {
            let row = document.createElement('div');
            row.className = 'row';
            for (let j = 0; j < WORD_LENGTH; j++) {
                let tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `tile-${i}-${j}`;
                row.appendChild(tile);
            }
            gameDiv.appendChild(row);
        }

        // Event-Listener für echte PC-Tastatur
        window.addEventListener('keydown', (e) => {
            if (isGameOver) return;
            if (e.key === 'Enter') pressKey('ENTER');
            else if (e.key === 'Backspace') pressKey('BACK');
            else if (/^[a-zA-ZäöüÄÖÜß]$/.test(e.key)) pressKey(e.key.toUpperCase());
        });

        function pressKey(key) {
            if (isGameOver) return;
            let currentRow = guesses.length;

            if (key === 'ENTER') {
                if (currentGuess.length === WORD_LENGTH) {
                    submitGuess();
                } else {
                    alert(`Das Wort muss exakt ${WORD_LENGTH} Buchstaben haben!`);
                }
            } else if (key === 'BACK') {
                if (currentGuess.length > 0) {
                    currentGuess = currentGuess.slice(0, -1);
                    updateRowDisplay(currentRow);
                }
            } else {
                if (currentGuess.length < WORD_LENGTH && key.length === 1) {
                    currentGuess += key;
                    updateRowDisplay(currentRow);
                }
            }
        }

        function updateRowDisplay(row) {
            for (let i = 0; i < WORD_LENGTH; i++) {
                let tile = document.getElementById(`tile-${row}-${i}`);
                tile.innerText = currentGuess[i] || "";
            }
        }

        function submitGuess() {
            let currentRow = guesses.length;
            guesses.push(currentGuess);
            let rowEmojis = "";

            // Buchstaben prüfen, färben und Tastatur updaten
            for (let i = 0; i < WORD_LENGTH; i++) {
                let letter = currentGuess[i];
                let tile = document.getElementById(`tile-${currentRow}-${i}`);
                
                let statusClass = "absent";
                if (letter === targetWord[i]) {
                    statusClass = "correct";
                    rowEmojis += "🟩";
                } else if (targetWord.includes(letter)) {
                    statusClass = "present";
                    rowEmojis += "🟨";
                } else {
                    rowEmojis += "⬛";
                }

                tile.classList.add(statusClass);
                updateKeyboardKey(letter, statusClass);
            }

            shareGrid.push(rowEmojis);

            if (currentGuess === targetWord) {
                document.getElementById('message').innerText = "🎉 Gewonnen!";
                endGame();
            } else if (guesses.length >= MAX_GUESSES) {
                document.getElementById('message').innerText = `😢 Verloren! Das Wort war: ${targetWord}`;
                endGame();
            }

            currentGuess = ""; // Bereit für die nächste Reihe
        }

        function updateKeyboardKey(letter, status) {
            // Sucht den Button auf der virtuellen Tastatur
            const buttons = document.querySelectorAll('.key');
            for (let btn of buttons) {
                if (btn.innerText === letter) {
                    // Ein grüner Status überschreibt alles, gelb überschreibt grau
                    if (btn.classList.contains('correct')) return;
                    if (btn.classList.contains('present') && status === 'absent') return;

                    btn.classList.remove('present', 'absent');
                    btn.classList.add(status);
                    break;
                }
            }
        }

        function endGame() {
            isGameOver = true;
            document.getElementById('shareBtn').style.display = 'block';
        }

        function shareResult() {
            const status = (guesses[guesses.length - 1] === targetWord) ? guesses.length : "X";
            let text = `🟩 **Custom Wordle Challenge**\nVersuch: ${status}/${MAX_GUESSES}\n\n`;
            text += shareGrid.join("\n");

            navigator.clipboard.writeText(text).then(() => {
                alert("Ergebnis kopiert! Füge es bei Discord ein.");
            });
        }
    </script>
</body>
</html>
